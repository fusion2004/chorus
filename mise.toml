[tools]
node = "24.15.0"
yarn = "4.14.1"

[env]
# Non-secret defaults that used to live in .envrc.sample.
# Per-developer values (secrets, IDs) go in mise.local.toml.
AWS_NODEJS_CONNECTION_REUSE_ENABLED = "1"
AWS_REGION = "us-east-1"

[tasks.dev]
description = "Live-reload dev server"
run = "yarn dev"

[tasks.build]
description = "Compile TypeScript to dist/"
run = "yarn build"

[tasks.start]
description = "Run the built bot"
run = "yarn start"

[tasks.test]
description = "Run the Vitest suite once"
run = "yarn test"

[tasks."test:watch"]
description = "Vitest in watch mode"
run = "yarn test:watch"

[tasks."test:coverage"]
description = "Vitest with v8 coverage"
run = "yarn test:coverage"

[tasks."lint:oxlint"]
run = "yarn lint:oxlint"
[tasks."lint:oxlint:fix"]
run = "yarn lint:oxlint:fix"
[tasks."lint:oxfmt"]
run = "yarn lint:oxfmt"
[tasks."lint:oxfmt:fix"]
run = "yarn lint:oxfmt:fix"
[tasks."lint:typecheck"]
description = "Type-check without emitting"
run = "yarn lint:typecheck"

[tasks.lint]
description = "Run all lint checks in parallel"
depends = ["lint:oxlint", "lint:oxfmt", "lint:typecheck"]

[tasks."lint:fix"]
description = "Auto-fix lint and format issues in parallel"
depends = ["lint:oxlint:fix", "lint:oxfmt:fix"]

[tasks."secrets:sync"]
description = "Refresh fnox.local.toml from 1Password (run after secrets rotate or on fresh clone)"
run = "fnox sync --provider age --local-file"
